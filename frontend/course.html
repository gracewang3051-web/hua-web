<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>课程详情</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">←</a>
    <h1 id="course-title">课程详情</h1>
  </div>

  <div class="container">
    <div class="hero">
      <h2 id="course-name">加载中...</h2>
      <p id="course-meta">11 节课 · 11 段音频 · 逐字稿</p>
    </div>

    <!-- 音频播放器 -->
    <div class="section-title">🎧 听讲解</div>
    <div class="card" id="audio-card">
      <audio id="audio-player" controls preload="none" style="width: 100%;">
        您的浏览器不支持 audio 标签。
      </audio>
      <div class="card-subtitle" id="audio-info" style="margin-top: 8px;">加载中...</div>
    </div>



    <!-- AI 学习报告 -->
    <div class="section-title">📑 AI 学习报告</div>
    <div class="card" id="report-card">
      <div class="card-subtitle" id="report-loading">加载中...</div>
    </div>

    <!-- 闪卡入口 -->
    <div class="section-title">🃏 闪卡复习（仅本课）</div>
    <a class="card" id="flashcard-link" href="#">
      <div class="card-title">本课闪卡</div>
      <div class="card-subtitle" id="flashcard-sub">点击进入复习</div>
      <div class="card-meta">
        <span class="tag tag-success">含记录</span>
        <span class="tag">三档评分</span>
      </div>
    </a>

    <!-- 参考资料（原始逐字稿, 内容精简降级） -->
    <div class="section-title">📚 参考资料</div>
    <div class="card" id="transcript-card">
      <div class="card-subtitle" id="transcript-loading">加载中...</div>
    </div>

    <!-- 全局闪卡 -->
    <a class="card" href="flashcard.html">
      <div class="card-title">全 11 节课闪卡</div>
      <div class="card-subtitle">570 张 · 跨课筛选</div>
    </a>
  </div>

  <script defer src="assets/data/flashcards-index.js"></script>
  <script defer src="assets/js/supabase.min.js"></script>
  <script defer src="assets/js/supabase-config.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

    // 解析 URL 参数
    const params = new URLSearchParams(location.search);
    const nb = params.get('id') || '001';
    const data = window.FLASHCARDS_INDEX;
    const title = data.notebooks[nb] || `华老师-${nb}`;

    document.getElementById('course-title').textContent = title;
    document.getElementById('course-name').textContent = title;
    const cardsInNb = data.cardsByNotebook[nb] || 0; // v1.2: index 仅含 notebooks 列表, 完整卡数据在 flashcard.html 加载
    document.getElementById('course-meta').textContent = `${cardsInNb} 张闪卡 · 11 节课 · AI 报告 + 参考资料`;
    document.getElementById('flashcard-sub').textContent = `仅显示本课 ${cardsInNb} 张 · 答题记录自动同步`;

    // audio
    // v1.2 fix: src 留空时 play 事件不触发 (播放键灰掉), 必须直接 set src
    // Render 海外 metadata 抓取 ~1s 可接受, 不再走懒加载
    const audio = document.getElementById('audio-player');
    audio.src = `assets/audio/${nb}.mp3`;
    audio.preload = 'metadata';
    document.getElementById('audio-info').textContent = `${nb}.mp3 · 加载中...`;
    audio.addEventListener('loadedmetadata', () => {
      const dur = Math.round(audio.duration);
      const m = Math.floor(dur/60), s = dur%60;
      document.getElementById('audio-info').textContent = `${nb}.mp3 · ${m}分${s}秒`;
    });
    audio.addEventListener('error', () => {
      document.getElementById('audio-info').textContent = `${nb}.mp3 · 加载失败 (HTTP ${audio.error?.code || '?'})`;
    });

    // flashcard link
    document.getElementById('flashcard-link').href = `flashcard.html?notebook=${nb}`;

    // transcript 加载（从 .md 转 inline 渲染）
    fetch(`assets/transcripts/${nb}.md`).then(r => {
      if (!r.ok) throw new Error('no transcript');
      return r.text();
    }).then(md => {
      const card = document.getElementById('transcript-card');
      card.innerHTML = `<details><summary>点击展开逐字稿 · ${md.length} 字符</summary><pre style="white-space: pre-wrap; font-family: -apple-system, sans-serif; font-size: 14px; line-height: 1.7; max-height: 60vh; overflow-y: auto; margin-top: 12px;">${md.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</pre></details>`;
    }).catch(() => {
      document.getElementById('transcript-card').innerHTML = '<div class="card-subtitle">该课暂无逐字稿</div>';
    });

    // AI 摘要播客加载 (NotebookLM AI 主持人对话音频)
    fetch(`assets/audio/ai-podcast/${nb}.mp3`, { method: 'HEAD' }).then(r => {
      if (r.ok) {
        const card = document.getElementById('ai-podcast-card');
        card.innerHTML = `
          <audio id="ai-podcast-player" controls preload="none" style="width: 100%;">
            您的浏览器不支持 audio 标签。
          </audio>
          <div class="card-subtitle" style="margin-top: 8px;">${nb}.mp3 · NotebookLM AI 摘要播客 · 加载中...</div>
        `;
        const audioEl = document.getElementById('ai-podcast-player');
        audioEl.dataset.src = `assets/audio/ai-podcast/${nb}.mp3`;
        audioEl.addEventListener('play', function once() {
          if (!audioEl.src || audioEl.src === window.location.href) {
            audioEl.src = audioEl.dataset.src;
          }
          audioEl.removeEventListener('play', once);
        }, { once: true });
        audioEl.addEventListener('loadedmetadata', () => {
          const dur = Math.round(audioEl.duration);
          const m = Math.floor(dur/60), s = dur%60;
          card.querySelector('.card-subtitle').textContent = `${nb}.mp3 · AI 主持人对话 · ${m}分${s}秒`;
        });
      } else {
        document.getElementById('ai-podcast-card').innerHTML = '<div class="card-subtitle">该课暂无 AI 摘要播客</div>';
      }
    }).catch(() => {
      document.getElementById('ai-podcast-card').innerHTML = '<div class="card-subtitle">该课暂无 AI 摘要播客</div>';
    });

    // AI 学习报告加载（NotebookLM 生成的 markdown 报告）
    fetch(`assets/reports/${nb}.md`).then(r => {
      if (!r.ok) throw new Error('no report');
      return r.text();
    }).then(md => {
      const card = document.getElementById('report-card');
      // 简单 markdown → HTML 渲染（标题 + 列表 + 段落）
      const escMd = md.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      const html = escMd
        .replace(/^# (.*$)/gm, '<h2 style="margin: 0 0 12px; font-size: 18px;">$1</h2>')
        .replace(/^## (.*$)/gm, '<h3 style="margin: 16px 0 8px; font-size: 16px; color: var(--primary);">$1</h3>')
        .replace(/^### (.*$)/gm, '<h4 style="margin: 12px 0 6px; font-size: 14px; color: var(--text);">$1</h4>')
        .replace(/^---$/gm, '<hr style="margin: 12px 0; border: 0; border-top: 1px dashed var(--border);">')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^\*   /gm, '• ')
        .replace(/^- /gm, '• ')
        .replace(/^(\d+)\. /gm, '$1. ')
        .split('\n\n').map(p => '<p style="margin: 8px 0; line-height: 1.7;">' + p.replace(/\n/g, '<br>') + '</p>').join('');
      card.innerHTML = `<details><summary style="font-weight: 500;">📑 点击展开 AI 学习报告 · ${md.length} 字符</summary><div style="margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 8px; max-height: 70vh; overflow-y: auto; font-size: 14px;">${html}</div></details>`;
    }).catch(() => {
      document.getElementById('report-card').innerHTML = '<div class="card-subtitle">该课暂无 AI 学习报告</div>';
    });
  
});
</script>
</body>
</html>
